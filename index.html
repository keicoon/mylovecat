  <head>

    <meta name="theme-color" content="#f7f8fb" />
    <meta
      name="description"
      content="고양이의 하루 컨디션을 빠르게 기록하고 변화 흐름을 추적하는 PWA"
    />
    <link rel="manifest" href="%BASE_URL%app.webmanifest" />
    <link rel="icon" type="image/png" href="%BASE_URL%favicon.png" />

  <body>
    <div id="root">
      <main class="static-public-content" aria-label="MyLoveCat 소개">
        <h1>MyLoveCat - 고양이 건강 상태 기록 및 추적</h1>
        <p>
          MyLoveCat은 보호자가 고양이의 식욕, 물 섭취, 배변, 소변, 활동량, 컨디션을 매일 짧게 기록하고
          변화를 확인할 수 있도록 만든 로컬 우선 PWA입니다.
        </p>
        <p>
          구토, 체중, 약 복용, 메모, 사진 같은 추가 기록을 함께 남기면 병원 상담 전 최근 상태 변화를 더
          쉽게 정리할 수 있습니다.
        </p>
        <nav aria-label="MyLoveCat 공개 페이지">
